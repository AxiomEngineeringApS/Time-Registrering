<!DOCTYPE html>
<html>
<head>
    <title>CSV Viewer</title>
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.10.24/css/jquery.dataTables.min.css">
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        #csv-content { margin-top: 20px; }
    </style>
</head>
<body>
    <h1>CSV Data Viewer</h1>
    <div id="csv-content">Loading...</div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.10.24/js/jquery.dataTables.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    
    <script>
        // Load and parse CSV file
        Papa.parse('Østerbrogade 156.csv', {
            download: true,
            header: true,
            dynamicTyping: true,
            complete: function(results) {
                // Create HTML table
                var table = '<table id="csv-table" class="display" style="width:100%"><thead><tr>';
                
                // Add headers
                results.meta.fields.forEach(function(field) {
                    table += '<th>' + field + '</th>';
                });
                table += '</tr></thead><tbody>';
                
                // Add data rows
                results.data.forEach(function(row) {
                    table += '<tr>';
                    results.meta.fields.forEach(function(field) {
                        table += '<td>' + (row[field] !== null ? row[field] : '') + '</td>';
                    });
                    table += '</tr>';
                });
                table += '</tbody></table>';
                
                // Display table
                document.getElementById('csv-content').innerHTML = table;
                
                // Initialize DataTable for sorting, searching, etc.
                $('#csv-table').DataTable({
                    pageLength: 25,
                    order: []
                });
            }
        });
    </script>
</body>
</html>
